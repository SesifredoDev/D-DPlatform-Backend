services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - d-platform-network

  api-service:
    build: ./api-service
    env_file: .env
    init: true
    ports:
      - "5000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-platform-network

  messaging-service:
    build: ./messaging-service
    env_file: .env
    init: true
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 3001"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-platform-network

  map-service:
    build: ./map-service
    env_file: .env
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 3003"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-platform-network

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880" # HTTP API / Signal
      - "7881:7881" # WebRTC Signal
      - "50000-50050:50000-50050/udp" # WebRTC Media
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7880/health"] # Assuming LiveKit has a health endpoint
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - d-platform-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      api-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      map-service:
        condition: service_healthy
      livekit:
        condition: service_healthy
    networks:
      - d-platform-network

networks:
  d-platform-network:
    driver: bridge

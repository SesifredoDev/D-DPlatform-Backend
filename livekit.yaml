port: 7880

bind_addresses:
  - "0.0.0.0"

rtc:
  # node_ip is usually better handled via environment variable LIVEKIT_RTC_EXTERNAL_IP
  # but if not provided, LiveKit will try to detect it.
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302

keys:
  devkey: "superlongsecuresecretkeyatleast32chars!!"

logging:
  level: info
